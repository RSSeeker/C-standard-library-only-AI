name: CI Build Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile with MinGW
        run: |
          g++ -std=c++17 -O2 -Wall -mwindows -static -o ai.exe main.cpp AI.cpp -lcomctl32

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-build
          path: ai.exe
